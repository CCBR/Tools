name: auto-format

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "src/**"
      - "README.qmd"

env:
  GH_TOKEN: ${{ github.token }}

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-format:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11"]

    steps:
      - name: Generate a token
        id: generate-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.CCBR_BOT_APP_ID }}
          private-key: ${{ secrets.CCBR_BOT_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ steps.generate-token.outputs.token }}
          ref: ${{ github.event_name == 'pull_request' && github.head_ref || github.ref_name }}

      - name: git config
        run: |
          git config --global user.name "CCBR-bot"
          git config --global user.email "258092125+ccbr-bot@users.noreply.github.com"

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
      - name: Install dependencies
        run: |
          python -m pip install .[dev,docs] --upgrade pip
      - uses: quarto-dev/quarto-actions/setup@v2
        with:
          version: 1.4.515
      - name: quarto render readme
        run: |
          quarto render README.qmd
      - name: format
        uses: pre-commit/action@v3.0.1
        continue-on-error: true
      - name: commit & push
        if: ${{ github.event_name == 'pull_request' }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "ci: 🤖 render readme" || echo "nothing to commit"
          git add .
          git commit -m "ci: 🤖 format with pre-commit" || echo "nothing to commit"
          git push || echo "nothing to push"

default_install_hook_types: [pre-commit, commit-msg]
default_stages: [pre-commit]
exclude: |
  (?x)(
      ^.*.svg|
      ^assets/|
      ^src/ccbr_tools/templates/mkdocs-fnl/docs/custom-overrides/|
      ^tests/data/
   )
repos:
  - repo: local
    hooks:
      - id: detect-absolute-paths
        name: Detect absolute paths
        entry: ccbr-hooks detect-absolute-paths
        language: python
        types: [text]
        args: ["--ignore-paths", "tests/**"]
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v1.2.3
    hooks:
      - id: check-added-large-files
        args: ["--maxkb=10240"]
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-json
  # spell check
  - repo: https://github.com/codespell-project/codespell
    rev: v2.4.1
    hooks:
      - id: codespell
        args:
          [
            -I,
            .github/WORDLIST,
            --skip,
            "*human_mouse_homolog_lookup.txt,*.rpt",
          ]
  # Python formatting
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.10
    hooks:
      - id: ruff-check
        args: [--fix]
      - id: ruff-format
  # general linting
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v3.1.0
    hooks:
      - id: prettier
        additional_dependencies:
          - prettier@3.2.5
  # enforce commit format
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v2.3.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
        args: []

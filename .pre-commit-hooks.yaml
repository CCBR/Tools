- id: detect-absolute-paths
  name: detect absolute paths
  description: Detect absolute file paths in the given files.
  entry: ccbr-hooks detect-absolute-paths
  language: python
  types: [text]
- id: sync-nextflow-version
  name: sync nextflow version
  description: Sync manifest.version in nextflow.config from the VERSION file.
  entry: ccbr-hooks sync-nextflow-version
  language: python
  always_run: true
  pass_filenames: false
